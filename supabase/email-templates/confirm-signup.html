<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirme ton compte ScanPlay</title>
</head>
<body style="margin:0;padding:0;background:#0f172a;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0f172a;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background:#1e293b;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 28px 16px;text-align:center;">
              <img src="https://scanplay.org/logo.png" alt="ScanPlay" width="64" height="64" style="display:block;margin:0 auto 16px;border-radius:12px;" />
              <h1 style="margin:0 0 8px;font-size:24px;color:#f8fafc;">Bienvenue sur ScanPlay !</h1>
              <p style="margin:0;font-size:15px;line-height:1.5;color:#94a3b8;">
                Confirme ton adresse email pour activer ton compte et sauvegarder ta progression.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 28px 32px;text-align:center;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;background:#22c55e;color:#052e16;font-weight:700;font-size:16px;text-decoration:none;padding:14px 28px;border-radius:12px;">
                Confirmer mon email
              </a>
              <p style="margin:24px 0 0;font-size:12px;line-height:1.5;color:#64748b;">
                Si le bouton ne fonctionne pas, copie ce lien dans ton navigateur :<br />
                <span style="word-break:break-all;color:#94a3b8;">{{ .ConfirmationURL }}</span>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px 28px;border-top:1px solid #334155;text-align:center;">
              <p style="margin:0;font-size:12px;color:#64748b;">
                ScanPlay — Scanne, joue, mémorise<br />
                <a href="https://scanplay.org" style="color:#22c55e;text-decoration:none;">scanplay.org</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
